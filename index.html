<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Carga — Paulo Meira</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#1F1F23;
    --bg-panel:#26262C;
    --bg-row:#2C2C33;
    --text:#EAEAEA;
    --text-dim:#B5B5B5;
    --gold:#D4A93A;
    --gold-light:#E8C46B;
    --line:#3A3A40;
    --green:#7BC47F;
    --red:#E07B7B;
    --blue:#6FB4E8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  header.topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    background:var(--bg-panel);
  }
  header.topbar img{height:40px;border-radius:6px;}
  header.topbar h1{font-size:17px;margin:0;color:var(--gold-light);font-weight:600;}
  header.topbar .spacer{flex:1;}
  header.topbar .userbox{font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:10px;}
  button, .btn{
    background:var(--gold);
    color:#1F1F23;
    border:none;
    padding:9px 16px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    font-size:13px;
  }
  button.secondary{background:transparent;color:var(--gold-light);border:1px solid var(--gold);}
  button.small{padding:6px 10px;font-size:12px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  input, select, textarea{
    background:#17171A;
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 10px;
    border-radius:6px;
    font-size:14px;
    width:100%;
  }
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .hidden{display:none !important;}

  /* LOGIN */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;padding:20px;
  }
  #loginScreen img{height:70px;margin-bottom:6px;border-radius:10px;}
  #loginScreen .card{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:28px;width:100%;max-width:340px;
  }
  #loginScreen h2{margin:0 0 18px;color:var(--gold-light);font-size:18px;text-align:center;}
  #loginError{color:var(--red);font-size:13px;margin-top:10px;min-height:16px;}

  /* LAYOUT */
  .app{display:flex;min-height:calc(100vh - 68px);}
  nav.sidebar{
    width:230px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--line);
    padding:16px 12px;overflow-y:auto;
  }
  nav.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);margin:6px 8px 10px;}
  .aluno-item{
    padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:4px;color:var(--text);
    display:flex;justify-content:space-between;align-items:center;
  }
  .aluno-item:hover{background:var(--bg-row);}
  .aluno-item.active{background:var(--gold);color:#1F1F23;font-weight:600;}
  .aluno-item .tag-inativo{font-size:10px;color:var(--red);border:1px solid var(--red);padding:1px 5px;border-radius:4px;}
  main.content{flex:1;padding:22px;overflow-y:auto;}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-bottom:22px;}
  .card{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .card h3{margin:0 0 4px;font-size:13px;color:var(--text-dim);font-weight:500;}
  .card .value{font-size:26px;font-weight:700;color:var(--gold-light);}
  .card .sub{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;}
  .badge.verde{background:rgba(123,196,127,.18);color:var(--green);}
  .badge.dourado{background:rgba(212,169,58,.18);color:var(--gold-light);}
  .badge.vermelho{background:rgba(224,123,123,.18);color:var(--red);}
  .badge.neutro{background:rgba(181,181,181,.15);color:var(--text-dim);}

  .chart-wrap{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:22px;}
  .chart-wrap h3{margin:0 0 12px;font-size:14px;color:var(--gold-light);}
  canvas{max-height:260px;}

  form.session-form{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:22px;
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;align-items:end;
  }
  form.session-form .full{grid-column:1/-1;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  table th, table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);}
  table th{color:var(--text-dim);font-weight:500;font-size:12px;}
  table tr:nth-child(even){background:var(--bg-row);}

  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;
  }
  .modal{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:24px;width:100%;max-width:360px;}
  .modal h3{margin:0 0 16px;color:var(--gold-light);}
  .modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
  .msg-ok{color:var(--green);font-size:13px;margin-top:8px;}
  .msg-erro{color:var(--red);font-size:13px;margin-top:8px;}
  .empty-state{color:var(--text-dim);font-size:14px;text-align:center;padding:60px 20px;}
  .info-note{font-size:12px;color:var(--text-dim);border-left:3px solid var(--gold);padding:8px 12px;background:var(--bg-row);border-radius:0 8px 8px 0;margin-bottom:18px;}

  /* ESCALA DE BORG (seleção de PSE por clique) */
  .pse-trigger{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    width:100%;text-align:left;background:#17171A;border:1px solid var(--line);color:var(--text-dim);
    font-weight:500;border-left:4px solid var(--line);
  }
  .pse-trigger .seta{color:var(--text-dim);font-size:12px;}
  .pse-trigger.selecionado{color:var(--text);}
  .modal-borg{max-width:440px;max-height:88vh;display:flex;flex-direction:column;}
  .modal-borg h3{margin-bottom:4px;}
  .modal-borg .sub{font-size:12px;color:var(--text-dim);margin-bottom:14px;}
  .borg-lista{overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:14px;padding-right:2px;}
  .borg-row{
    display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;
    border:2px solid transparent;transition:transform .12s ease, border-color .15s ease;
  }
  .borg-row:hover{transform:translateX(2px);}
  .borg-row.selecionada{border-color:#fff;box-shadow:0 0 0 1px #fff inset;}
  .borg-row .borg-num{
    width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.28);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;
  }
  .borg-row .borg-label{flex:1;font-weight:600;font-size:14px;color:#fff;}
  .borg-row .borg-emoji{font-size:19px;flex-shrink:0;}

  .acoes-cell{white-space:nowrap;}
  .acoes-cell button{margin-right:6px;padding:5px 10px;font-size:12px;}
  .btn-excluir-sessao,.btn-excluir-anotacao{background:var(--red);color:#fff;}
  .btn-excluir-sessao:hover,.btn-excluir-anotacao:hover{opacity:.85;}

  @media (max-width:760px){
    .app{flex-direction:column;}
    nav.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--line);max-height:220px;}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <img src="logo.jpg" alt="Paulo Meira">
  <div class="card">
    <h2>Controle de Carga Interna</h2>
    <div class="field">
      <label>Usuário</label>
      <input id="loginUsuario" autocomplete="username" placeholder="seu usuário">
    </div>
    <div class="field">
      <label>Senha</label>
      <input id="loginSenha" type="password" autocomplete="current-password" placeholder="sua senha">
    </div>
    <button id="btnLogin" style="width:100%">Entrar</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appScreen" class="hidden">
  <header class="topbar">
    <img src="logo.jpg" alt="Paulo Meira">
    <h1>Controle de Carga Interna</h1>
    <div class="spacer"></div>
    <div class="userbox">
      <span id="userLabel"></span>
      <button class="secondary small" id="btnLogout">Sair</button>
    </div>
  </header>

  <div class="app">
    <nav class="sidebar hidden" id="sidebarTreinador">
      <div class="aluno-item" id="btnRelatorioGeral" style="font-weight:600;color:var(--gold-light);">📊 Relatório geral</div>
      <h3>Alunos</h3>
      <div id="listaAlunos"></div>
      <button class="secondary small" id="btnNovoAluno" style="width:100%;margin-top:10px;">+ Novo aluno</button>
    </nav>

    <main class="content">
      <div id="visaoGeral"></div>
      <div id="painelAluno"></div>
    </main>
  </div>
</div>

<!-- Modal novo aluno -->
<div class="modal-bg hidden" id="modalNovoAluno">
  <div class="modal">
    <h3>Novo aluno</h3>
    <div class="field"><label>Nome completo</label><input id="novoAlunoNome"></div>
    <div class="field"><label>Usuário (login)</label><input id="novoAlunoUsuario" placeholder="ex: joao.silva"></div>
    <div class="field"><label>Senha inicial</label><input id="novoAlunoSenha" placeholder="mínimo 4 caracteres"></div>
    <div id="novoAlunoMsg"></div>
    <div class="actions">
      <button class="secondary" id="btnCancelarNovoAluno">Cancelar</button>
      <button id="btnSalvarNovoAluno">Criar aluno</button>
    </div>
  </div>
</div>

<!-- Modal editar sessão -->
<div class="modal-bg hidden" id="modalEditarSessao">
  <div class="modal">
    <h3>Editar sessão</h3>
    <div class="field"><label>Data</label><input type="date" id="eData"></div>
    <div class="field">
      <label>PSE (Escala de Borg 0–10)</label>
      <input type="hidden" id="ePse">
      <button type="button" class="pse-trigger" id="btnAbrirBorgEdicao">
        <span id="pseTriggerTextoEdicao">Toque para selecionar</span><span class="seta">▾</span>
      </button>
    </div>
    <div class="field"><label>Horas (opcional)</label><input type="number" id="eTempoHoras" min="0" step="1" placeholder="ex: 1"></div>
    <div class="field"><label>Minutos*</label><input type="number" id="eTempoMinutos" min="0" max="59" step="1" placeholder="ex: 30"></div>
    <div class="field"><label>Observações (opcional)</label><input id="eObs" placeholder="ex: treino de força, bloco de potência..."></div>
    <div id="editarSessaoMsg"></div>
    <div class="actions">
      <button class="secondary" id="btnCancelarEdicao">Cancelar</button>
      <button id="btnSalvarEdicao">Salvar alterações</button>
    </div>
  </div>
</div>

<!-- Modal excluir sessão -->
<div class="modal-bg hidden" id="modalExcluirSessao">
  <div class="modal">
    <h3>Excluir sessão?</h3>
    <p id="excluirSessaoInfo" style="color:var(--text-dim);font-size:14px;margin-top:0;"></p>
    <div id="excluirSessaoMsg"></div>
    <div class="actions">
      <button class="secondary" id="btnCancelarExclusao">Cancelar</button>
      <button id="btnConfirmarExclusao" style="background:var(--red);color:#fff;">Excluir</button>
    </div>
  </div>
</div>

<!-- Modal editar anotação -->
<div class="modal-bg hidden" id="modalEditarAnotacao">
  <div class="modal">
    <h3>Editar anotação</h3>
    <div class="field"><label>Exercício*</label><input id="eExercicio"></div>
    <div class="field"><label>Séries</label><input id="eSeries"></div>
    <div class="field"><label>Reps</label><input id="eReps"></div>
    <div class="field"><label>Carga</label><input id="eCarga"></div>
    <div class="field"><label>Descanso</label><input id="eDescanso"></div>
    <div class="field"><label>Observação (opcional)</label><input id="eObservacao"></div>
    <div id="editarAnotacaoMsg"></div>
    <div class="actions">
      <button class="secondary" id="btnCancelarEdicaoAnotacao">Cancelar</button>
      <button id="btnSalvarEdicaoAnotacao">Salvar alterações</button>
    </div>
  </div>
</div>

<!-- Modal excluir anotação -->
<div class="modal-bg hidden" id="modalExcluirAnotacao">
  <div class="modal">
    <h3>Excluir anotação?</h3>
    <p id="excluirAnotacaoInfo" style="color:var(--text-dim);font-size:14px;margin-top:0;"></p>
    <div id="excluirAnotacaoMsg"></div>
    <div class="actions">
      <button class="secondary" id="btnCancelarExclusaoAnotacao">Cancelar</button>
      <button id="btnConfirmarExclusaoAnotacao" style="background:var(--red);color:#fff;">Excluir</button>
    </div>
  </div>
</div>

<!-- Modal escala de Borg (seleção de PSE por clique) -->
<div class="modal-bg hidden" id="modalBorg">
  <div class="modal modal-borg">
    <h3>Escala de Borg</h3>
    <div class="sub">Percepção Subjetiva de Esforço (PSE) — toque no nível que melhor descreve o esforço da sessão.</div>
    <div class="borg-lista" id="borgLista"></div>
    <div class="actions">
      <button class="secondary" id="btnFecharBorg">Fechar</button>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   CONFIGURAÇÃO — troque pela URL do seu Web App do Google Apps Script
   (Deploy > New deployment > Web app > copie a URL que termina em /exec)
   ========================================================================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxUegHMm5jJWUkD2lUX7_3K_aYMPw4_crYLRYUD-G4z68ff2yDZ4A2si4vSxfPDx1x_/exec";

/* ============================= ESTADO ============================= */
let sessao = {
  token: localStorage.getItem('cargaTreino_token') || null,
  role: localStorage.getItem('cargaTreino_role') || null,
  usuario: localStorage.getItem('cargaTreino_usuario') || null,
  nome: localStorage.getItem('cargaTreino_nome') || null,
};
let alunos = [];
let alunoAtual = null; // usuario do aluno selecionado (visão treinador) ou o próprio (visão aluno)
let charts = {};
let pseSelecionado = null;

/* ============================= API ============================= */
async function chamarApi(payload) {
  if (!API_URL || API_URL.indexOf('COLE_AQUI') !== -1) {
    alert('Configure a constante API_URL no topo do index.html com a URL do seu Web App do Google Apps Script.');
    throw new Error('API_URL não configurada');
  }
  const body = Object.assign({}, payload, { token: sessao.token });
  const resp = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  });
  const rawText = await resp.text();
  let data;
  try {
    data = JSON.parse(rawText);
  } catch (parseErr) {
    console.error('Resposta inesperada da API (status ' + resp.status + '): ' + rawText.slice(0, 300));
    throw parseErr;
  }
  if (data.erro === 'Sessão inválida ou expirada. Faça login novamente.') {
    encerrarSessaoLocal();
    mostrarLogin();
  }
  return data;
}

/* ============================= LOGIN / LOGOUT ============================= */
document.getElementById('btnLogin').addEventListener('click', fazerLogin);
document.getElementById('loginSenha').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });

async function fazerLogin() {
  const usuario = document.getElementById('loginUsuario').value.trim();
  const senha = document.getElementById('loginSenha').value;
  const erroEl = document.getElementById('loginError');
  erroEl.textContent = '';
  if (!usuario || !senha) { erroEl.textContent = 'Preencha usuário e senha.'; return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', usuario, senha }) });
    const rawText = await resp.text();
    let data;
    try {
      data = JSON.parse(rawText);
    } catch (parseErr) {
      erroEl.textContent = 'Resposta inesperada do servidor (status ' + resp.status + '). Tente novamente em alguns segundos.';
      console.error('Falha ao interpretar resposta do login:', rawText);
      return;
    }
    if (!data.ok) { erroEl.textContent = data.erro || 'Falha no login.'; return; }
    sessao = { token: data.token, role: data.role, usuario: data.usuario, nome: data.nome };
    localStorage.setItem('cargaTreino_token', sessao.token);
    localStorage.setItem('cargaTreino_role', sessao.role);
    localStorage.setItem('cargaTreino_usuario', sessao.usuario);
    localStorage.setItem('cargaTreino_nome', sessao.nome);
    await iniciarApp();
  } catch (err) {
    erroEl.textContent = 'Não foi possível conectar ao servidor. Verifique o API_URL.';
    console.error(err);
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

document.getElementById('btnLogout').addEventListener('click', async () => {
  try { await chamarApi({ action: 'logout' }); } catch (e) {}
  encerrarSessaoLocal();
  mostrarLogin();
});

function encerrarSessaoLocal() {
  localStorage.removeItem('cargaTreino_token');
  localStorage.removeItem('cargaTreino_role');
  localStorage.removeItem('cargaTreino_usuario');
  localStorage.removeItem('cargaTreino_nome');
  sessao = { token: null, role: null, usuario: null, nome: null };
}

function mostrarLogin() {
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginSenha').value = '';
}

/* ============================= INICIALIZAÇÃO ============================= */
async function iniciarApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userLabel').textContent = sessao.nome + (sessao.role === 'treinador' ? ' (treinador)' : '');

  if (sessao.role === 'treinador') {
    document.getElementById('sidebarTreinador').classList.remove('hidden');
    await carregarAlunos();
    await renderVisaoGeralTreinador();
  } else {
    document.getElementById('sidebarTreinador').classList.add('hidden');
    alunoAtual = sessao.usuario;
    await renderPainelAluno(sessao.usuario, sessao.nome, false);
  }
}

if (sessao.token) { iniciarApp().catch(() => mostrarLogin()); }

/* ============================= ESCALA DE BORG (seleção de PSE por clique) =============================
   Escala de Borg adaptada (CR-10) — Percepção Subjetiva de Esforço.
   Gradiente de cor acompanha a intensidade: verde (leve) → dourado (moderado) → vermelho (intenso).
============================================================================= */
const BORG_ESCALA = [
  { v:0,  label:'Repouso',            emoji:'😴', cor:'#45454E' },
  { v:1,  label:'Demasiado leve',     emoji:'🙂', cor:'#4F8F63' },
  { v:2,  label:'Muito muito leve',   emoji:'🙂', cor:'#63A56A' },
  { v:3,  label:'Muito leve',         emoji:'😊', cor:'#7BC47F' },
  { v:4,  label:'Leve',               emoji:'🙂', cor:'#A8C769' },
  { v:5,  label:'Leve – Moderado',    emoji:'😐', cor:'#D4A93A' },
  { v:6,  label:'Moderado',           emoji:'😐', cor:'#D99A3A' },
  { v:7,  label:'Moderado – Intenso', emoji:'😕', cor:'#DE8A3A' },
  { v:8,  label:'Intenso',            emoji:'😣', cor:'#E17A4A' },
  { v:9,  label:'Muito intenso',      emoji:'😖', cor:'#D96450' },
  { v:10, label:'Exaustivo',          emoji:'🥵', cor:'#C0392B' },
];

function renderBorgLista() {
  const el = document.getElementById('borgLista');
  el.innerHTML = BORG_ESCALA.map(b => `
    <div class="borg-row${pseSelecionado === b.v ? ' selecionada' : ''}" data-v="${b.v}" style="background:${b.cor}">
      <span class="borg-num">${b.v}</span>
      <span class="borg-label">${b.label}</span>
      <span class="borg-emoji">${b.emoji}</span>
    </div>
  `).join('');
  el.querySelectorAll('.borg-row').forEach(row => {
    row.addEventListener('click', () => selecionarPse(Number(row.dataset.v)));
  });
}

// borgAlvo define quais elementos (campo oculto / texto do gatilho / botão gatilho) a escala de Borg
// atualiza quando um valor é escolhido — permite reutilizar o mesmo modal no formulário de nova sessão
// e no modal de edição de sessão.
let borgAlvo = { hidden: 'fPse', texto: 'pseTriggerTexto', trigger: 'btnAbrirBorg' };

function abrirModalBorg(alvo) {
  borgAlvo = alvo;
  const valorAtual = document.getElementById(alvo.hidden).value;
  pseSelecionado = valorAtual !== '' ? Number(valorAtual) : null;
  renderBorgLista();
  document.getElementById('modalBorg').classList.remove('hidden');
}

function selecionarPse(v) {
  pseSelecionado = v;
  const info = BORG_ESCALA.find(b => b.v === v);
  const campoOculto = document.getElementById(borgAlvo.hidden);
  if (campoOculto) campoOculto.value = v;
  const textoEl = document.getElementById(borgAlvo.texto);
  if (textoEl) textoEl.textContent = v + ' — ' + info.label;
  const trigger = document.getElementById(borgAlvo.trigger);
  if (trigger) {
    trigger.classList.add('selecionado');

async function recarregarPainelAtual() {
  if (!contextoSessaoAtual) return;
  const { usuarioAluno, souTreinador } = contextoSessaoAtual;
  const nomeAtual = souTreinador ? (alunos.find(a => a.usuario === usuarioAluno) || {}).nome : sessao.nome;

document.getElementById('btnSalvarEdicao').addEventListener('click', async () => {
  const msgEl = document.getElementById('editarSessaoMsg');
  const data = document.getElementById('eData').value;
  const pse = document.getElementById('ePse').value;
  const horasStr = document.getElementById('eTempoHoras').value;
  const minutosStr = document.getElementById('eTempoMinutos').value;

  const btn = document.getElementById('btnSalvarEdicao');

  msgEl.innerHTML = '';
  if (!data) { msgEl.innerHTML = '<div class="msg-erro">Informe a data.</div>'; return; }
  if (pse === '' || pse === null) { msgEl.innerHTML = '<div class="msg-erro">Selecione o PSE na escala de Borg.</div>'; return; }
  if (minutosStr === '' || minutosStr === null) { msgEl.innerHTML = '<div class="msg-erro">Informe os minutos (as horas são opcionais).</div>'; return; }
  const horas = Number(horasStr) || 0;
  const minutos = Number(minutosStr) || 0;
  const tempoTotalMin = horas * 60 + minutos;
  if (tempoTotalMin <= 0) { msgEl.innerHTML = '<div class="msg-erro">O tempo total da sessão deve ser maior que 0.</div>'; return; }

  btn.disabled = true;
  try {
    const resp = await chamarApi({ action: 'editarSessao', id: sessaoEditandoId, data, pse, tempo_min: tempoTotalMin, observacoes: obs });

/* ============================= VISÃO GERAL (treinador, sem aluno selecionado) — RELATÓRIO GERAL ============================= */
async function renderVisaoGeralTreinador() {
  document.getElementById('painelAluno').innerHTML = '';
  const el = document.getElementById('visaoGeral');
  if (alunos.length === 0) {
    el.innerHTML = '<div class="empty-state">Nenhum aluno cadastrado ainda. Clique em "+ Novo aluno" para começar.</div>';
    return;
  }

  el.innerHTML = '<p style="color:var(--text-dim)">Carregando relatório geral...</p>';

  const resp = await chamarApi({ action: 'getSessoesTodos' });
  const todasSessoes = resp.ok ? resp.sessoes : [];

  const porAluno = {};
  todasSessoes.forEach(s => {
    if (!porAluno[s.aluno_usuario]) porAluno[s.aluno_usuario] = [];
    porAluno[s.aluno_usuario].push(s);
  });

  const mesAtual = hojeISO().slice(0, 7); // YYYY-MM
  const PRIORIDADE = { vermelho: 0, dourado: 1, verde: 2, neutro: 3 };

  const linhas = alunos.map(a => {
    const sessoesDoAluno = porAluno[a.usuario] || [];
    const analise = analisarCargaInterna(sessoesDoAluno);
    const ultima = analise.vazio ? null : analise.semanas[analise.semanas.length - 1];
    const cargaMes = sessoesDoAluno
      .filter(s => s.data.slice(0, 7) === mesAtual)
      .reduce((soma, s) => soma + Number(s.carga_ua), 0);

    const cMono = classificarMonotonia(ultima ? ultima.monotonia : null);
    const cStrain = classificarStrain(ultima ? ultima.strain : null);
    const cAcwr = classificarAcwr(ultima ? ultima.acwr : null);

    return { aluno: a, ultima, cargaMes: round2(cargaMes), cMono, cStrain, cAcwr };
  });

  linhas.sort((x, y) => PRIORIDADE[x.cAcwr.cor] - PRIORIDADE[y.cAcwr.cor]);

  el.innerHTML = `
    <h2 style="color:var(--gold-light);margin-top:0;">Relatório geral</h2>
    <div class="info-note">Panorama de todos os alunos: carga da semana atual, carga do mês e classificação de Monotonia, Strain e ACWR. Clique em um aluno na lista à esquerda para ver o detalhe completo.</div>
    <div class="chart-wrap">
      <table>
        <thead><tr>
          <th>Aluno</th><th>Carga semana atual (u.a.)</th><th>Carga do mês (u.a.)</th>
          <th>Monotonia</th><th>Strain</th><th>ACWR</th>
        </tr></thead>
        <tbody>${linhas.map(l => `<tr>
          <td>${escapeHtml(l.aluno.nome)}${l.aluno.ativo ? '' : ' <span class="tag-inativo">inativo</span>'}</td>
          <td>${l.ultima ? l.ultima.cargaSemanal : '—'}</td>
          <td>${l.cargaMes || '—'}</td>
          <td>${l.ultima && l.ultima.monotonia !== null ? l.ultima.monotonia : '—'} <span class="badge ${l.cMono.cor}">${l.cMono.texto}</span></td>
          <td>${l.ultima && l.ultima.strain !== null ? l.ultima.strain : '—'} <span class="badge ${l.cStrain.cor}">${l.cStrain.texto}</span></td>
          <td>${l.ultima && l.ultima.acwr !== null ? l.ultima.acwr : '—'} <span class="badge ${l.cAcwr.cor}">${l.cAcwr.texto}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

async function salvarSessao(usuarioAluno, souTreinador) {
  const data = document.getElementById('fData').value;
  const pse = document.getElementById('fPse').value;
  const horasStr = document.getElementById('fTempoHoras').value;
  const minutosStr = document.getElementById('fTempoMinutos').value;

  const msgEl = document.getElementById('msgSessao');
  const btn = document.getElementById('btnSalvarSessao');

  msgEl.innerHTML = '';

  if (pse === '' || pse === null) {
    msgEl.innerHTML = '<div class="msg-erro">Selecione o PSE na escala de Borg.</div>';
    return;
  }
  if (minutosStr === '' || minutosStr === null) {
    msgEl.innerHTML = '<div class="msg-erro">Informe os minutos da sessão (as horas são opcionais).</div>';
    return;
  }
  const horas = Number(horasStr) || 0;
  const minutos = Number(minutosStr) || 0;
  const tempoTotalMin = horas * 60 + minutos;
  if (tempoTotalMin <= 0) {
    msgEl.innerHTML = '<div class="msg-erro">O tempo total da sessão deve ser maior que 0.</div>';
    return;
  }

  btn.disabled = true;
  try {
    const payload = { action: 'addSessao', data, pse, tempo_min: tempoTotalMin, observacoes: obs };
    if (souTreinador) payload.aluno_usuario = usuarioAluno;
    const resp = await chamarApi(payload);
    if (!resp.ok) { msgEl.innerHTML = '<div class="msg-erro">' + escapeHtml(resp.erro) + '</div>'; return; }
    msgEl.innerHTML = '<div class="msg-ok">Sessão salva! Carga: ' + resp.carga_ua + ' u.a. (' + tempoTotalMin + ' min)</div>';
    const nomeAtual = souTreinador ? (alunos.find(a => a.usuario === usuarioAluno) || {}).nome : sessao.nome;
    await renderPainelAluno(usuarioAluno, nomeAtual || usuarioAluno, souTreinador);
  } finally {
    btn.disabled = false;
  }
}

/* ============================= CÁLCULOS: FOSTER / MONOTONIA / STRAIN / ACWR =============================
   Fórmulas conforme references/formulas.md da skill "controle-carga-treino" (Paulo Meira):
   - Carga diária (u.a.) = PSE (Borg 0-10) × tempo da sessão (min)
   - Semana ISO completa (segunda a domingo), dias sem treino contam como carga 0
   - Monotonia = média diária da semana ÷ desvio padrão POPULACIONAL diário da semana
   - Strain = Carga semanal total × Monotonia
   - ACWR = carga da semana atual (aguda) ÷ média das 4 semanas crônicas anteriores
     (só é exibido quando existem 4+ semanas anteriores no histórico)
============================================================================= */
function analisarCargaInterna(sessoes) {
  if (!sessoes || sessoes.length === 0) return { semanas: [], vazio: true };

  const cargaPorDia = {}; // 'YYYY-MM-DD' -> soma de carga do dia
  sessoes.forEach(s => {
    cargaPorDia[s.data] = (cargaPorDia[s.data] || 0) + Number(s.carga_ua);
  });

  const datas = Object.keys(cargaPorDia).sort();
  const primeiraSegunda = segundaDaSemana(new Date(datas[0] + 'T00:00:00'));
  const ultimaData = new Date(datas[datas.length - 1] + 'T00:00:00');

  const semanas = [];
  let cursor = new Date(primeiraSegunda);
  while (cursor <= ultimaData) {
    const dias = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(cursor);
      d.setDate(d.getDate() + i);
      const iso = isoDate(d);
      dias.push(cargaPorDia[iso] || 0);
    }
    const cargaSemanal = dias.reduce((a, b) => a + b, 0);
    const media = cargaSemanal / 7;
    const desvio = desvioPadraoPopulacional(dias);
    const monotonia = desvio > 0 ? media / desvio : null;
    const strain = monotonia !== null ? cargaSemanal * monotonia : null;
    semanas.push({
      inicio: isoDate(cursor),
      cargaSemanal: round2(cargaSemanal),
      monotonia: monotonia !== null ? round2(monotonia) : null,
      strain: strain !== null ? round2(strain) : null,
    });
    cursor.setDate(cursor.getDate() + 7);
  }

  for (let i = 0; i < semanas.length; i++) {
    if (i >= 4) {
      const anteriores = semanas.slice(i - 4, i).map(s => s.cargaSemanal);
      const mediaCronica = anteriores.reduce((a, b) => a + b, 0) / 4;
      semanas[i].acwr = mediaCronica > 0 ? round2(semanas[i].cargaSemanal / mediaCronica) : null;
    } else {
      semanas[i].acwr = null;
    }
  }

  return { semanas, vazio: false };
}

function segundaDaSemana(d) {
  const dia = d.getDay(); // 0=domingo
  const diff = (dia === 0 ? -6 : 1 - dia);
  const seg = new Date(d);
  seg.setDate(seg.getDate() + diff);
  seg.setHours(0,0,0,0);
  return seg;
}
function isoDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function desvioPadraoPopulacional(arr) {
  const media = arr.reduce((a,b)=>a+b,0) / arr.length;
  const variancia = arr.reduce((a,b)=>a + Math.pow(b-media,2), 0) / arr.length;
  return Math.sqrt(variancia);
}
function round2(n) { return Math.round(n * 100) / 100; }

function classificarMonotonia(m) {
  if (m === null) return { texto: 'N/A', cor: 'neutro' };
  if (m > 2.0) return { texto: 'Alta (risco)', cor: 'vermelho' };
  if (m >= 1.0) return { texto: 'Ideal', cor: 'dourado' };
  return { texto: 'Baixa', cor: 'verde' };
}
function classificarStrain(s) {
  if (s === null) return { texto: 'N/A', cor: 'neutro' };
  if (s > 4500) return { texto: 'Alto', cor: 'vermelho' };
  if (s >= 2500) return { texto: 'Moderado (ideal)', cor: 'dourado' };
  return { texto: 'Baixo', cor: 'verde' };
}
function classificarAcwr(a) {
  if (a === null) return { texto: 'Aguardando histórico', cor: 'neutro' };
  if (a > 1.5) return { texto: 'Risco alto', cor: 'vermelho' };
  if (a >= 0.8 && a <= 1.3) return { texto: 'Zona ótima', cor: 'verde' };
  return { texto: 'Atenção', cor: 'dourado' };
}

/* ============================= RENDER: CARDS ============================= */
function renderCardsMetricas(analise) {
  const el = document.getElementById('cardsMetricas');
  if (analise.vazio) { el.innerHTML = ''; return; }
  const ultima = analise.semanas[analise.semanas.length - 1];
  const cMono = classificarMonotonia(ultima.monotonia);
  const cStrain = classificarStrain(ultima.strain);
  const cAcwr = classificarAcwr(ultima.acwr);

  el.innerHTML = `
    <div class="card">
      <h3>Carga da semana atual</h3>
      <div class="value">${ultima.cargaSemanal}</div>
      <div class="sub">u.a. (semana de ${formatarDataBR(ultima.inicio)})</div>
    </div>
    <div class="card">
      <h3>Monotonia</h3>
      <div class="value">${ultima.monotonia ?? '—'}</div>
      <span class="badge ${cMono.cor}">${cMono.texto}</span>
    </div>
    <div class="card">
      <h3>Strain</h3>
      <div class="value">${ultima.strain ?? '—'}</div>
      <span class="badge ${cStrain.cor}">${cStrain.texto}</span>
    </div>
    <div class="card">
      <h3>ACWR (Agudo:Crônico)</h3>
      <div class="value">${ultima.acwr ?? '—'}</div>
      <span class="badge ${cAcwr.cor}">${cAcwr.texto}</span>
    </div>
  `;
}

/* ============================= RENDER: GRÁFICOS ============================= */
function renderGraficos(analise) {
  ['chartCarga','chartAcwr','chartMonotoniaStrain'].forEach(id => {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  });
  if (analise.vazio) return;

  const labels = analise.semanas.map(s => formatarDataBR(s.inicio));
  const cores = {
    grid: 'rgba(255,255,255,.06)',
    texto: '#B5B5B5',
    dourado: '#D4A93A',
    douradoClaro: '#E8C46B',
    azul: '#6FB4E8',
    verde: '#7BC47F',
    vermelho: '#E07B7B',
  };
  Chart.defaults.color = cores.texto;
  Chart.defaults.borderColor = cores.grid;

  const corPorClassificacao = (cor) => cor === 'verde' ? cores.verde : cor === 'vermelho' ? cores.vermelho : cor === 'dourado' ? cores.dourado : 'rgba(181,181,181,.35)';

  charts.chartCarga = new Chart(document.getElementById('chartCarga'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Carga semanal (u.a.)', data: analise.semanas.map(s => s.cargaSemanal), backgroundColor: cores.dourado, borderRadius:4 }] },
    options: { responsive:true, plugins:{legend:{display:false}} }
  });

  const coresAcwr = analise.semanas.map(s => corPorClassificacao(classificarAcwr(s.acwr).cor));

  charts.chartAcwr = new Chart(document.getElementById('chartAcwr'), {
    type: 'bar',
    data: { labels, datasets: [
      { type:'bar', label: 'ACWR', data: analise.semanas.map(s => s.acwr), backgroundColor: coresAcwr, borderRadius:4, order:2 },
      { type:'line', label: 'Zona ótima (0.8)', data: labels.map(()=>0.8), borderColor: cores.verde, borderDash:[5,5], pointRadius:0, order:1 },
      { type:'line', label: 'Zona ótima (1.3)', data: labels.map(()=>1.3), borderColor: cores.verde, borderDash:[5,5], pointRadius:0, order:1 },
      { type:'line', label: 'Risco alto (1.5)', data: labels.map(()=>1.5), borderColor: cores.vermelho, borderDash:[5,5], pointRadius:0, order:1 },
    ]},
    options: { responsive:true, plugins:{legend:{labels:{boxWidth:12,font:{size:10}}}} }
  });

  const coresMono = analise.semanas.map(s => corPorClassificacao(classificarMonotonia(s.monotonia).cor));
  const coresStrain = analise.semanas.map(s => corPorClassificacao(classificarStrain(s.strain).cor));

  charts.chartMonotoniaStrain = new Chart(document.getElementById('chartMonotoniaStrain'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'Monotonia', data: analise.semanas.map(s=>s.monotonia), backgroundColor: coresMono, yAxisID:'y', borderRadius:4 },
      { label:'Strain', data: analise.semanas.map(s=>s.strain), backgroundColor: coresStrain, yAxisID:'y1', borderRadius:4 },
    ]},
    options: {
      responsive:true,
      interaction:{mode:'index', intersect:false},
      scales:{
        y:{ type:'linear', position:'left', title:{display:true,text:'Monotonia'} },
        y1:{ type:'linear', position:'right', title:{display:true,text:'Strain (u.a.)'}, grid:{drawOnChartArea:false} },
      }
    }
  });
}

/* ============================= HELPERS ============================= */
function hojeISO() { return isoDate(new Date()); }
function formatarDataBR(iso) {
  const [y,m,d] = iso.split('-');
  return d + '/' + m + '/' + y.slice(2);
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
